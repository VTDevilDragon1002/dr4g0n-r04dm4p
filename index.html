<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dr4g0n r04dm4p // VT Dr4g0n</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Cinzel:wght@600;700;900&display=swap');

  :root{
    --bg:#0a0705;
    --bg-alt:#130d0a;
    --line:#2a1c14;
    --ember:#ff6a2b;
    --crimson:#c81d25;
    --gold:#d4a017;
    --text:#ecdfd1;
    --text-dim:#9c8a78;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,29,37,0.10), transparent 70%),
      radial-gradient(ellipse 50% 50% at 85% 100%, rgba(212,160,23,0.06), transparent 70%),
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    overflow-x:hidden;
  }

  /* ambient ember particles */
  .embers{position:fixed; inset:0; pointer-events:none; z-index:0;}
  .embers span{
    position:absolute; bottom:-10px; width:3px; height:3px; border-radius:50%;
    background:var(--ember); opacity:.6; filter:blur(0.5px);
    animation: rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:.8;}
    100%{ transform:translateY(-110vh) translateX(20px); opacity:0;}
  }

  .wrap{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6vh 5vw;
    text-align:center;
  }

  .glyph{
    font-size:2.4rem;
    letter-spacing:.4em;
    color:var(--crimson);
    text-shadow:0 0 30px rgba(200,29,37,.5);
    margin-bottom:1.2rem;
  }

  .handle{
    font-family:'Cinzel', serif;
    font-weight:900;
    font-size:clamp(2.2rem, 7vw, 4.4rem);
    letter-spacing:.03em;
    background:linear-gradient(120deg, var(--gold) 0%, var(--ember) 45%, var(--crimson) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 60px rgba(255,106,43,.25);
  }

  .at{
    color:var(--text-dim);
    font-size:.95rem;
    letter-spacing:.15em;
    margin-top:.6rem;
    text-transform:uppercase;
  }
  .at a{color:var(--gold); text-decoration:none; border-bottom:1px dashed var(--gold);}
  .at a:hover{color:var(--ember); border-color:var(--ember);}

  .tagline{
    margin-top:1.6rem;
    color:var(--text-dim);
    font-size:.85rem;
    letter-spacing:.08em;
    max-width:520px;
  }

  .divider{
    width:220px; height:1px; margin:3rem 0 2.6rem;
    background:linear-gradient(90deg, transparent, var(--crimson), var(--gold), transparent);
    position:relative;
  }
  .divider::after{
    content:'◆';
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    background:var(--bg); padding:0 10px;
    color:var(--gold); font-size:.7rem;
  }

  .prompt{
    font-size:.75rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:1.8rem;
  }

  .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(230px, 1fr));
    gap:1.4rem;
    width:100%;
    max-width:760px;
  }

  .card{
    position:relative;
    display:block;
    text-decoration:none;
    color:var(--text);
    background:linear-gradient(180deg, var(--bg-alt), var(--bg));
    border:1px solid var(--line);
    border-radius:6px;
    padding:2rem 1.4rem 1.6rem;
    overflow:hidden;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .card::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(160deg, rgba(255,106,43,.10), transparent 55%);
    opacity:0; transition:opacity .25s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:var(--ember);
    box-shadow:0 10px 40px -12px rgba(255,106,43,.35);
  }
  .card:hover::before{opacity:1;}

  .card .num{
    display:inline-block;
    font-size:.7rem;
    letter-spacing:.2em;
    color:var(--gold);
    border:1px solid var(--line);
    padding:.2rem .5rem;
    border-radius:3px;
    margin-bottom:1rem;
  }

  .card h2{
    font-family:'Cinzel', serif;
    font-size:1.35rem;
    color:var(--text);
    margin-bottom:.5rem;
    letter-spacing:.02em;
  }
  .card p{
    font-size:.78rem;
    color:var(--text-dim);
    line-height:1.5;
  }
  .card .go{
    margin-top:1.2rem;
    font-size:.72rem;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:var(--crimson);
  }
  .card .go::after{content:' →'; color:var(--ember);}

  .card.soon{
    opacity:.45;
    pointer-events:none;
  }
  .card.soon .go{color:var(--text-dim);}
  .card.soon .go::after{content:' ⏳';}

  footer{
    margin-top:4rem;
    font-size:.68rem;
    letter-spacing:.1em;
    color:var(--text-dim);
    opacity:.6;
  }
  footer .fire{color:var(--crimson);}
</style>
</head>
<body>

<div class="embers" id="embers"></div>

<div class="wrap">
  <div class="handle">VT Dr4g0n</div>
  <div class="at">Instagram — <a href="https://instagram.com/vt_dr4g0n" target="_blank" rel="noopener">@vt_dr4g0n</a></div>

  <div class="divider"></div>
  <div class="prompt">Choose your path</div>

  <div class="cards" id="cardGrid">
    <!-- cards injected by JS from ROADMAPS array below -->
  </div>

  <footer>forged in <span class="fire">ember &amp; code</span> — dr4g0n-r04dm4p</footer>
</div>

<script>
  // Add a new entry here whenever a new roadmap file is added to the repo
  // (e.g. next week's Linux roadmap) and a card appears automatically.
  const ROADMAPS = [
    {
      num: "01",
      title: "Web Application Security",
      desc: "HTTP to expert exploitation — 18 modules covering fundamentals, vulnerabilities, auth, APIs, tooling, recon, pentest methodology, CTFs, bug bounty & certifications.",
      href: "web-roadmap.html",
      status: "ready"
    },
    {
      num: "02",
      title: "Networking",
      desc: "Devices, IP addressing, protocols, routing, security fundamentals, CLI tools, MITM, monitoring, enterprise & cloud networking, full cert path — Phase 0 to 44.",
      href: "network-roadmap.html",
      status: "ready"
    },
    {
      num: "03",
      title: "Linux",
      desc: "Coming next week.",
      href: "#",
      status: "soon"
    }
  ];

  const grid = document.getElementById('cardGrid');
  ROADMAPS.forEach(r => {
    const el = document.createElement(r.status === 'soon' ? 'div' : 'a');
    el.className = 'card' + (r.status === 'soon' ? ' soon' : '');
    if (r.status !== 'soon') el.href = r.href;
    el.innerHTML = `
      <span class="num">${r.num}</span>
      <h2>${r.title}</h2>
      <p>${r.desc}</p>
      <div class="go">${r.status === 'soon' ? 'Coming soon' : 'Enter roadmap'}</div>
    `;
    grid.appendChild(el);
  });

  // ambient embers
  const emberHost = document.getElementById('embers');
  for(let i=0;i<26;i++){
    const s = document.createElement('span');
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDuration = (6 + Math.random()*8) + 's';
    s.style.animationDelay = (Math.random()*10) + 's';
    s.style.opacity = 0.3 + Math.random()*0.5;
    emberHost.appendChild(s);
  }
</script>
</body>
</html>
